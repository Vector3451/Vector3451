<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector3451 · EDM Contribution Sequencer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      color: #00B4D8;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 0.75rem;
      color: #8b949e;
      margin-bottom: 28px;
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 24px;
    }

    button {
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 8px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: all 0.15s;
    }

    button:hover {
      border-color: #00B4D8;
      color: #00B4D8;
    }

    #play-btn {
      background: #002233;
      border-color: #00B4D8;
      color: #00B4D8;
      font-weight: bold;
    }

    #play-btn.playing {
      background: #00B4D8;
      color: #0d1117;
    }

    .bpm-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: #8b949e;
    }

    #bpm-val {
      width: 48px;
      text-align: center;
      background: #161b22;
      border: 1px solid #30363d;
      color: #00B4D8;
      padding: 4px;
      border-radius: 4px;
    }

    .grid-wrap {
      overflow-x: auto;
      max-width: 100vw;
      padding: 10px;
    }

    #step-indicator {
      display: grid;
      grid-template-columns: 20px repeat(52, 12px);
      gap: 3px;
      justify-content: center;
      margin-bottom: 5px;
    }

    .step-dot {
      height: 4px;
      border-radius: 2px;
      background: transparent;
      transition: background 0.05s;
    }

    .step-dot.active {
      background: #00B4D8;
    }

    #grid {
      display: grid;
      grid-template-columns: 20px repeat(52, 12px);
      gap: 3px;
      justify-content: center;
    }

    .row-label {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-size: 0.65rem;
      color: #8b949e;
      padding-right: 4px;
    }

    .cell {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      background: #161b22;
      cursor: pointer;
      transition: transform 0.05s, border-color 0.1s;
      border: 1px solid rgba(255, 255, 255, 0.02);
    }

    .cell:hover {
      border-color: #8b949e;
    }

    /* GitHub Contribution Level Colors */
    .lvl-1 {
      background: #003b5c;
      border-color: #003b5c;
    }

    .lvl-2 {
      background: #006994;
      border-color: #006994;
    }

    .lvl-3 {
      background: #0097c7;
      border-color: #0097c7;
    }

    .lvl-4 {
      background: #00B4D8;
      border-color: #00B4D8;
      box-shadow: 0 0 5px rgba(0, 180, 216, 0.4);
    }

    .cell.flash {
      transform: scale(1.3);
      z-index: 10;
      box-shadow: 0 0 10px #ffffff;
      background: #ffffff !important;
      opacity: 1 !important;
    }

    .preset-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 24px;
    }

    .preset-row button {
      font-size: 0.70rem;
      padding: 4px 10px;
    }

    a.back-link {
      margin-top: 40px;
      font-size: 0.75rem;
      color: #8b949e;
      text-decoration: none;
      border-bottom: 1px dotted #8b949e;
    }

    a.back-link:hover {
      color: #00B4D8;
      border-bottom-color: #00B4D8;
    }
  </style>
</head>

<body>

  <h1>&gt;_ EDM CONTRIBUTION GRID</h1>
  <div class="sub">52 Weeks · 7 Audio Tracks · Web Audio Synthesis<br />Click squares to paint commits and build the
    drop.</div>

  <div class="controls">
    <button id="play-btn" onclick="togglePlay()">▶ LAUNCH SEQUENCE</button>
    <button onclick="clearGrid()">✕ WIPE GRAPH</button>
    <div class="bpm-row">
      BPM <input id="bpm-val" type="number" value="128" min="60" max="240" oninput="updateBPM()" />
    </div>
  </div>

  <div class="grid-wrap">
    <div id="step-indicator">
      <div class="si-blank"></div>
    </div>
    <div id="grid"></div>
  </div>

  <div class="preset-row">
    <button onclick="applyPreset('house')">LOAD: BIG ROOM</button>
    <button onclick="applyPreset('trap')">LOAD: TRAP COMBO</button>
    <button onclick="applyPreset('random')">LOAD: RANDOM COMMITS</button>
  </div>

  <a class="back-link" href="https://github.com/Vector3451">← ABORT TO PROFILE</a>

  <script>
    const ROWS = [
      { label: "S", type: "kick" }, // Sunday     - Huge EDM Kick
      { label: "M", type: "bass" }, // Monday     - Sub Bass
      { label: "T", type: "snare" }, // Tuesday    - Crack Snare/Clap
      { label: "W", type: "hihat" }, // Wednesday  - Closed Hat
      { label: "T", type: "open" }, // Thursday   - Open Hat
      { label: "F", type: "pluck" }, // Friday     - Synth Pluck (Low)
      { label: "S", type: "saw" }  // Saturday   - Supersaw (High)
    ];
    const STEPS = 52;
    // 0=off, 1-4=active (representing commit intensity / velocity)
    let grid = Array.from({ length: ROWS.length }, () => Array(STEPS).fill(0));
    let currentStep = 0;
    let playing = false;
    let intervalId = null;
    let bpm = 128;
    let audioCtx = null;

    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }

    // ---------------- AUDIO SYNTHESIS ENGINE (EDM FOCUSED) ----------------
    function playSound(row, when, velocity) {
      const ctx = getCtx();
      const type = ROWS[row].type;

      // Velocity scales amplitude 0.4 to 1.0
      const volMulti = 0.4 + (velocity * 0.15);

      if (type === 'kick') {
        // Punchy EDM Kick
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(150, when);
        osc.frequency.exponentialRampToValueAtTime(45, when + 0.05); // Snap
        osc.frequency.exponentialRampToValueAtTime(30, when + 0.5);  // Tail
        gain.gain.setValueAtTime(1.2 * volMulti, when);
        gain.gain.exponentialRampToValueAtTime(0.001, when + 0.5);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(when); osc.stop(when + 0.5);

      } else if (type === 'bass') {
        // Rolling Sub Bass
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(65, when); // Low F freq
        // Ducking effect (sidechain simulation for up-beats)
        gain.gain.setValueAtTime(0.01, when);
        gain.gain.linearRampToValueAtTime(0.8 * volMulti, when + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, when + 0.4);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(when); osc.stop(when + 0.4);

      } else if (type === 'snare') {
        // Sharp Snare + Noise
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass'; filter.frequency.value = 2500;
        const sg = ctx.createGain();
        src.connect(filter); filter.connect(sg); sg.connect(ctx.destination);
        sg.gain.setValueAtTime(1.0 * volMulti, when);
        sg.gain.exponentialRampToValueAtTime(0.001, when + 0.2);
        src.start(when); src.stop(when + 0.2);

        // Snare Body
        const oscP = ctx.createOscillator();
        const gainP = ctx.createGain();
        oscP.type = 'triangle';
        oscP.frequency.setValueAtTime(200, when);
        oscP.frequency.exponentialRampToValueAtTime(100, when + 0.1);
        oscP.connect(gainP); gainP.connect(ctx.destination);
        gainP.gain.setValueAtTime(0.7 * volMulti, when);
        gainP.gain.exponentialRampToValueAtTime(0.001, when + 0.15);
        oscP.start(when); oscP.stop(when + 0.15);

      } else if (type === 'hihat') {
        // Tight tick
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        const filter = ctx.createBiquadFilter();
        filter.type = 'highpass'; filter.frequency.value = 9000;
        const sg = ctx.createGain();
        src.buffer = buf;
        src.connect(filter); filter.connect(sg); sg.connect(ctx.destination);
        sg.gain.setValueAtTime(0.4 * volMulti, when);
        sg.gain.exponentialRampToValueAtTime(0.001, when + 0.03);
        src.start(when); src.stop(when + 0.03);

      } else if (type === 'open') {
        // Washy cymbal
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.35, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource();
        const filter = ctx.createBiquadFilter();
        filter.type = 'highpass'; filter.frequency.value = 7500;
        const sg = ctx.createGain();
        src.buffer = buf;
        src.connect(filter); filter.connect(sg); sg.connect(ctx.destination);
        sg.gain.setValueAtTime(0.4 * volMulti, when);
        sg.gain.exponentialRampToValueAtTime(0.001, when + 0.3);
        src.start(when); src.stop(when + 0.3);

      } else if (type === 'pluck') {
        // Short Pluck Synth
        const osc = ctx.createOscillator();
        const filter = ctx.createBiquadFilter();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(220, when); // A3
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(3000, when);
        filter.frequency.exponentialRampToValueAtTime(200, when + 0.1);
        osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0.3 * volMulti, when);
        gain.gain.exponentialRampToValueAtTime(0.001, when + 0.15);
        osc.start(when); osc.stop(when + 0.15);

      } else if (type === 'saw') {
        // Sustained Supersaw Chord simulation (A minor triad roughly)
        const freqs = [440, 523.25, 659.25]; // A4, C5, E5
        freqs.forEach(f => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const filter = ctx.createBiquadFilter();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(f, when);
          filter.type = 'lowpass';
          filter.frequency.setValueAtTime(4000, when); // Filter opens up on hit
          filter.frequency.linearRampToValueAtTime(1000, when + 0.4);
          osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
          gain.gain.setValueAtTime(0.15 * volMulti, when);
          gain.gain.linearRampToValueAtTime(0.1 * volMulti, when + 0.2);
          gain.gain.exponentialRampToValueAtTime(0.001, when + 0.5);
          osc.start(when); osc.stop(when + 0.5);
        });
      }
    }
    // ----------------------------------------------------------------------

    function step() {
      const ctx = getCtx();
      const when = ctx.currentTime + 0.05; // lookahead scheduling for tight timing

      document.querySelectorAll('.step-dot').forEach((d, i) => d.classList.toggle('active', i === currentStep));

      for (let r = 0; r < ROWS.length; r++) {
        const val = grid[r][currentStep];
        if (val > 0) {
          playSound(r, when, val);
          // Visual flash
          const cell = document.getElementById(`c-${r}-${currentStep}`);
          if (cell) {
            cell.classList.add('flash');
            setTimeout(() => cell.classList.remove('flash'), 80);
          }
        }
      }
      currentStep = (currentStep + 1) % STEPS;
    }

    function togglePlay() {
      if (!playing) {
        getCtx().resume();
        playing = true;
        currentStep = 0;
        const ms = (60 / bpm / 4) * 1000; // 16th notes
        intervalId = setInterval(step, ms);
        document.getElementById('play-btn').textContent = '■ ABORT SEQUENCE';
        document.getElementById('play-btn').classList.add('playing');
      } else {
        clearInterval(intervalId);
        playing = false;
        document.getElementById('play-btn').textContent = '▶ LAUNCH SEQUENCE';
        document.getElementById('play-btn').classList.remove('playing');
        document.querySelectorAll('.step-dot').forEach(d => d.classList.remove('active'));
      }
    }

    function updateBPM() {
      bpm = parseInt(document.getElementById('bpm-val').value) || 128;
      if (playing) {
        clearInterval(intervalId);
        intervalId = setInterval(step, (60 / bpm / 4) * 1000);
      }
    }

    function clearGrid() {
      grid = Array.from({ length: ROWS.length }, () => Array(STEPS).fill(0));
      renderGrid();
    }

    function applyPreset(type) {
      clearGrid();
      // 4 beat groups = 16 steps. Repeats 3 times = 48 steps. Math works easily for the first 48.
      if (type === 'house') {
        document.getElementById('bpm-val').value = 128;
        for (let i = 0; i < STEPS; i++) {
          if (i % 4 === 0) grid[0][i] = 4; // four to floor kick
          if (i % 8 === 4) grid[2][i] = 4; // clap backbeat
          if (i % 2 === 0) grid[3][i] = 2; // subtle 8th hat
          if (i % 4 === 2) grid[4][i] = 3; // offbeat open hat
          if (i % 8 === 6) grid[6][i] = Math.random() > 0.5 ? 4 : 0; // sporadic saw stab
        }
      } else if (type === 'trap') {
        document.getElementById('bpm-val').value = 145;
        for (let i = 0; i < STEPS; i++) {
          if (i % 16 === 0 || i % 16 === 10) grid[0][i] = 4; // spaced kicks
          if (i % 8 === 4) grid[2][i] = 4; // half-time snare
          if (i % 1 === 0) grid[3][i] = (i % 4 === 3) ? 1 : 2; // fast rolling hihats with accents
          if (i % 16 === 6 || i % 16 === 14) grid[5][i] = 3; // low pluck accents
          if (Math.random() > 0.9) grid[6][i] = 4; // totally random high saw hit
        }
      } else if (type === 'random') {
        for (let r = 0; r < ROWS.length; r++) {
          for (let s = 0; s < STEPS; s++) {
            grid[r][s] = Math.random() > 0.85 ? Math.floor(Math.random() * 4) + 1 : 0;
          }
        }
      }
      updateBPM();
      renderGrid();
    }

    function renderGrid() {
      const g = document.getElementById('grid');
      g.innerHTML = '';
      // Build row headers
      for (let r = 0; r < ROWS.length; r++) {
        const lbl = document.createElement('div');
        lbl.className = 'row-label';
        lbl.textContent = ROWS[r].label;
        g.appendChild(lbl);

        // Build cells
        for (let s = 0; s < STEPS; s++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          const val = grid[r][s];
          if (val > 0) cell.classList.add(`lvl-${val}`);
          cell.id = `c-${r}-${s}`;

          // Click logic: cycle 0 -> 1 -> 2 -> 3 -> 4 -> 0
          cell.addEventListener('click', () => {
            let v = grid[r][s];
            v = (v + 1) % 5;
            grid[r][s] = v;
            cell.className = 'cell';
            if (v > 0) cell.classList.add(`lvl-${v}`);
            if (v > 0) playSound(r, getCtx().currentTime, v); // preview hit
          });
          g.appendChild(cell);
        }
      }
    }

    // Build indicator UI
    const si = document.getElementById('step-indicator');
    const blank = document.createElement('div');
    si.appendChild(blank);
    for (let s = 0; s < STEPS; s++) {
      const dot = document.createElement('div');
      dot.className = 'step-dot';
      si.appendChild(dot);
    }

    renderGrid();
  </script>
</body>

</html>
